<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Collection Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Collection</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones! Collect Enough Water Drops Before Time Runs Out.</p>
        <div class="score-panel">
            <div class="score-group">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="timer">Time: <span id="time">30</span>s</div>
            </div>
            <div class="button-group">
                <button id="start-btn">Start Game</button>
                <button id="reset-btn">Reset</button>
            </div>
            <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="header-logo">
        </div>

        <div id="game-container">
             <img src="img/African_Landscape_Background.jpg" alt="Desert landscape" class="responsive-img">
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</body>
</html>
